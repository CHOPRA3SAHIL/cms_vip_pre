<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pre-Publish Review — SEO Gate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7;
    --paper: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: #2a2a2a;
    --muted: #8a8a85;
    --line: #e8e6df;
    --line-soft: #f1efe9;
    --ok: #1f6f3e;
    --ok-bg: #ecf3ee;
    --warn: #8a6d1f;
    --warn-bg: #f5f0e0;
    --err: #8a2a1f;
    --err-bg: #f5e8e5;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 24px 80px -32px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.015) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.015) 0%, transparent 50%);
    padding: 48px 24px;
  }

  .frame {
    max-width: 960px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 2px;
    overflow: hidden;
  }

  header {
    padding: 36px 56px 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 32px;
  }

  .header-left .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ok); display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .header-left h1 em {
    font-style: italic;
    font-weight: 300;
  }

  .header-left .post-title {
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-left .post-title span {
    color: var(--ink-soft);
  }

  .header-right {
    text-align: right;
    min-width: 220px;
  }

  .score-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .score {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  .score-total {
    font-size: 18px;
    color: var(--muted);
    margin-left: 2px;
  }

  .score-bar {
    margin-top: 12px;
    height: 1px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }

  .score-bar-fill {
    position: absolute;
    inset: 0;
    background: var(--ink);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.2, 0, 0, 1);
  }

  .autorun-banner {
    padding: 14px 56px;
    background: var(--line-soft);
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 12px;
  }

  .autorun-left {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .autorun-status { color: var(--muted); }

  .rerun-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--line);
    padding: 6px 12px;
    cursor: pointer;
    color: var(--ink-soft);
    border-radius: 2px;
    transition: all 0.18s ease;
  }

  .rerun-btn:hover { border-color: var(--ink); background: var(--paper); }

  .sections { padding: 16px 0 0; }

  .section {
    padding: 24px 56px 28px;
    border-bottom: 1px solid var(--line-soft);
  }

  .section:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 18px;
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .section-meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .item {
    border-top: 1px solid var(--line-soft);
    padding: 14px 0;
    transition: background 0.15s ease;
    position: relative;
  }

  .item:first-of-type { border-top: none; padding-top: 4px; }

  .item-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 18px;
    align-items: center;
    cursor: pointer;
  }

  .indicator {
    width: 18px;
    height: 18px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    flex-shrink: 0;
    position: relative;
  }

  .indicator.manual { cursor: pointer; }
  .indicator.manual:hover { border-color: var(--ink-soft); }

  .indicator.checked {
    background: var(--ink);
    border-color: var(--ink);
  }

  .indicator.checked::after {
    content: '';
    width: 9px;
    height: 5px;
    border-left: 1.5px solid var(--paper);
    border-bottom: 1.5px solid var(--paper);
    transform: rotate(-45deg) translateY(-1px);
  }

  .indicator.running { border-color: var(--line); background: var(--paper); }
  .indicator.running::after {
    content: '';
    width: 10px; height: 10px;
    border: 1.5px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .indicator.passed {
    background: var(--ok);
    border-color: var(--ok);
  }
  .indicator.passed::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 1.5px solid var(--paper);
    border-bottom: 1.5px solid var(--paper);
    transform: rotate(-45deg) translateY(-1px);
  }

  .indicator.failed {
    background: var(--err-bg);
    border-color: var(--err);
  }
  .indicator.failed::after {
    content: '!';
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--err);
    line-height: 1;
  }

  .item-main { min-width: 0; }

  .item-title {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-bottom: 2px;
  }

  .item-summary {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.4;
  }

  .item-status {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 2px;
    background: var(--line-soft);
    color: var(--muted);
  }

  .pill.critical { background: #2a2a2a; color: var(--paper); }
  .pill.manual { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .pill.result-pass { background: var(--ok-bg); color: var(--ok); }
  .pill.result-fail { background: var(--err-bg); color: var(--err); }
  .pill.result-running { background: transparent; color: var(--muted); border: 1px solid var(--line); }

  .chevron {
    width: 14px;
    height: 14px;
    color: var(--muted);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .item.open .chevron { transform: rotate(90deg); }

  .detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.2, 0, 0, 1);
  }

  .item.open .detail { max-height: 1200px; }

  .detail-inner {
    padding: 18px 0 8px 42px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .detail-block {
    border-left: 1px solid var(--line);
    padding-left: 18px;
  }

  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .detail-text {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .detail-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: var(--line-soft);
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--ink);
  }

  .detail-text strong {
    font-weight: 600;
    color: var(--ink);
  }

  .result-box {
    margin-top: 4px;
    padding: 10px 12px;
    background: var(--line-soft);
    border-left: 2px solid var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .result-box.pass { background: var(--ok-bg); border-left-color: var(--ok); color: var(--ok); }
  .result-box.fail { background: var(--err-bg); border-left-color: var(--err); color: var(--err); }

  footer {
    padding: 28px 56px 36px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.015));
    border-top: 1px solid var(--line);
  }

  .footer-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .footer-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s ease;
  }

  .footer-status.ready .dot { background: var(--ok); }
  .footer-status.ready { color: var(--ok); }
  .footer-status.blocked .dot { background: var(--err); }
  .footer-status.blocked { color: var(--err); }

  .footer-actions {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .btn {
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 14px 28px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    min-width: 140px;
  }

  .btn:hover { border-color: var(--ink); }

  .btn-save { flex: 0 1 auto; }

  .btn-publish {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .btn-publish.disabled {
    background: var(--line-soft);
    color: var(--muted);
    border-color: var(--line);
    cursor: not-allowed;
  }

  .btn-publish.disabled:hover { border-color: var(--line); }
  .btn-publish:not(.disabled):hover { background: #000; }

  .btn-publish-arrow {
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.3s ease;
  }

  .btn-publish:not(.disabled):hover .btn-publish-arrow {
    transform: translateY(-2px);
  }

  @media (max-width: 720px) {
    body { padding: 16px 12px; }
    header { padding: 28px 24px 24px; flex-direction: column; align-items: flex-start; }
    .header-right { text-align: left; width: 100%; }
    .autorun-banner { padding: 12px 24px; flex-wrap: wrap; }
    .section { padding: 20px 24px 24px; }
    footer { padding: 24px; }
    .header-left h1 { font-size: 28px; }
    .score { font-size: 44px; }
    .detail-inner { padding-left: 0; }
    .footer-actions { flex-direction: column; }
    .btn { width: 100%; }
    .lang-toggle { align-self: flex-start; }
  }

  /* Language toggle */
  .lang-toggle {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
    background: var(--paper);
  }

  .lang-toggle button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .lang-toggle button + button { border-left: 1px solid var(--line); }

  .lang-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }

  .lang-toggle button:not(.active):hover { color: var(--ink); }
</style>
</head>
<body>

<div class="frame">

  <header>
    <div class="header-left">
      <div class="lang-toggle">
        <button id="lang-hi" class="active" data-lang="hi">हिन्दी</button>
        <button id="lang-en" data-lang="en">English</button>
      </div>
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span data-i18n="eyebrow">पब्लिश से पहले रिव्यू · SEO गेट</span>
      </div>
      <h1 data-i18n="headline">लाइव होने से <em>पहले</em>।</h1>
      <div class="post-title"><span data-i18n="postlabel">पोस्ट</span>: <span id="post-title-display">Budget 2026 — टैक्स स्लैब में बड़ा बदलाव, जानें किसे फायदा</span></div>
    </div>
    <div class="header-right">
      <div class="score-label" data-i18n="readiness">तैयारी</div>
      <div class="score">
        <span id="score-num">0</span><span class="score-total">/<span id="score-total">0</span></span>
      </div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar"></div></div>
    </div>
  </header>

  <div class="autorun-banner">
    <div class="autorun-left">
      <span class="autorun-status" id="autorun-status">ऑटोमैटिक जाँच चल रही है…</span>
    </div>
    <button class="rerun-btn" id="rerun-btn"><span data-i18n="rerun">↻ ऑटो जाँच दोबारा चलाएँ</span></button>
  </div>

  <div class="sections" id="sections"></div>

  <footer>
    <div class="footer-status" id="footer-status">
      <span class="dot"></span>
      <span id="status-text">जाँच चल रही है…</span>
    </div>
    <div class="footer-actions">
      <button class="btn btn-save" id="btn-save" data-i18n="savedraft">ड्राफ्ट सेव करें</button>
      <button class="btn btn-publish disabled" id="btn-publish">
        <span class="btn-publish-arrow">↑</span><span data-i18n="publish">पब्लिश करें</span>
      </button>
    </div>
  </footer>

</div>

<script>
const checklist = [
  {
    section: 'Editorial Craft',
    items: [
      {
        id: 'headline-craft',
        title: 'Headline is tight, cased correctly, with a hook',
        summary: 'No redundant words, no all-lowercase, top keyword leads, emotional hook for social.',
        critical: true,
        type: 'manual',
        what: 'The headline carries the single most important high-traffic keyword at or near the front. It contains no redundant phrasing — if the headline already says \'दुल्हन बनीं\', it should not also say \'रचाया ब्याह\'. No word is set in all-lowercase. The on-site SEO headline is short and crisp; the social-share headline carries an emotional hook.',
        why: 'Redundant words dilute the keyword density and waste the limited character budget Google shows in the SERP. All-lowercase words read as careless and hurt brand perception in Discover. A flat headline with no hook gets near-zero social pickup even when the SEO headline ranks.',
        how: 'Read the headline aloud. Cut any word that repeats an idea already present. Capitalise correctly. Then ask: would I tap this if it appeared in my WhatsApp feed? If not, sharpen the hook without making it click-bait.'
      },
      {
        id: 'headline-intro-match',
        title: 'Headline angle is justified in the intro',
        summary: 'The promise/angle in the headline is delivered inside the first paragraph.',
        critical: true,
        type: 'manual',
        what: 'Whatever angle or claim the headline takes must be substantiated within the intro paragraph itself — not three paragraphs down. If a live blog headline was changed mid-update, the intro must be rewritten to match the new headline.',
        why: 'Readers (and Google\'s quality systems) judge whether the page delivered on its headline within the first screen. A mismatch is read as click-bait even when the headline is technically accurate, and triggers fast bounce-backs to the SERP.',
        how: 'After finalising the headline, re-read only the intro. If the headline\'s core promise isn\'t clearly answered there, edit the intro — not the headline. For updated live blogs, treat the intro rewrite as mandatory, not optional.'
      },
      {
        id: 'intro-discipline',
        title: 'Intro is 70–100 words',
        summary: 'First paragraph length is auto-checked; opening-with-news is guidance.',
        critical: true,
        type: 'auto',
        autoResult: { pass: true, message: 'Intro = 84 words · within the 70–100 range.' },
        what: 'The automated gate checks one measurable thing: the first paragraph is between 70 and 100 words. The rest is editorial guidance the system cannot verify — the intro should open with the actual news (not essay-style background), and trending keywords should appear here with the English form in brackets where useful, e.g. (Budget 2026).',
        why: 'Google weights the opening paragraph heavily for topical relevance and readers decide within seconds. Word count is enforceable automatically; whether it opens with the news is a judgment the editor still owns.',
        how: 'Keep the first paragraph in the 70–100 word band. Separately, put the single most newsworthy fact in the first sentence and move context to paragraph two or three. Add the English keyword in brackets the first time the topic is named.'
      },
      {
        id: 'paragraph-rhythm',
        title: 'Paragraph length is balanced',
        summary: 'No one-line fragments or oversized blocks; flow remains editor judgment.',
        critical: false,
        type: 'auto',
        autoResult: { pass: true, message: '7 paragraphs · avg 71 words · no one-line or >180-word blocks.' },
        what: 'The automated gate flags structural problems it can measure: very short one-line paragraphs and oversized walls (roughly >180 words). It does not judge whether each paragraph logically follows the previous one — that remains the editor\'s read.',
        why: 'Erratic paragraph lengths correlate with thin or padded content and render badly on mobile and AMP. Length is measurable automatically; narrative flow is not.',
        how: 'Keep body paragraphs in a roughly even band. If the check flags a fragment or a wall, merge or split it. Separately, read the piece to confirm each paragraph connects to the one before it.'
      },
      {
        id: 'excerpt-original',
        title: 'Excerpt is original, not copied from the body',
        summary: '2–3 fresh lines; covers keywords the headline couldn\'t; creates curiosity.',
        critical: true,
        type: 'auto',
        autoResult: { pass: true, message: 'Excerpt vs body similarity: 12% · no shared sentence · distinct.' },
        what: 'The excerpt / meta description is 2–3 sentences written separately — no sentence is copy-pasted from the article body. It covers the important keywords that could not fit in the headline, and it leaves the reader wanting to read on.',
        why: 'A meta description that duplicates the body wastes the one piece of SERP copy you fully control and gives Google a reason to auto-rewrite it. A distinct, curiosity-driven excerpt directly lifts click-through rate from search and social.',
        how: 'Write the excerpt last, after the body is final, with the body hidden. If any sentence in it also appears verbatim in the article, rewrite that sentence. End on an open loop, not a full summary.'
      }
    ]
  },
  {
    section: 'Content Integrity',
    items: [
      {
        id: 'word-count',
        title: 'Word count meets minimum threshold',
        summary: 'Article body has at least 300 words across 3+ paragraphs.',
        critical: true,
        type: 'auto',
        autoResult: { pass: true, message: '412 words across 5 paragraphs — passed.' },
        what: 'Confirms the post contains a substantive body — at minimum 300 words distributed across three or more paragraphs.',
        why: 'Thin pages compete poorly in news ranking and are routinely excluded from Google Discover. Below this floor, the page is flagged as low-value and pushed down.',
        how: 'If under threshold, expand context, background, related developments, or quotes. Avoid padding — add information the reader cannot already get from the headline.'
      },
      {
        id: 'title-meta',
        title: 'Title & meta — full names + English keyword in summary',
        summary: 'Title & meta filled with full names; English keyword required in the meta/summary, suggested in title.',
        critical: true,
        type: 'auto',
        autoResult: { pass: true, message: 'Title 58c · Meta 152c · Full name present · English keyword found in meta.' },
        what: 'SEO Title (50–60 characters) and Meta Description (140–160 characters) must both exist and use <strong>full names</strong> (not first names alone, not initials). The agreed English keyword is <strong>required in the meta description / summary</strong>. In the title it is <strong>only a suggestion</strong> — add it if it fits naturally, but it is not enforced there.',
        why: 'These are the click decision in the SERP. Full names match how readers search; partial names fail. The English keyword in the summary is what makes a regional-language story discoverable by mixed-script queries, so it must be present there. Forcing it into the title can make the headline read awkwardly, so it stays optional in the title.',
        how: 'Front-load the primary keyword. Spell names out completely. Always place the English keyword somewhere in the meta description. In the title, include it only if it reads naturally — skip it rather than break the headline. Avoid duplicating the H1 verbatim.'
      },
      {
        id: 'heading-structure',
        title: 'Heading hierarchy is valid (H1 → H2 → H3)',
        summary: 'Exactly one H1, H2s precede H3s, no skipped levels.',

let currentLang = 'hi';

const sectionsEl = document.getElementById('sections');
const state = {};

checklist.forEach((section, sIdx) => {
  const sectionDiv = document.createElement('div');
  sectionDiv.className = 'section';

  const total = section.items.length;
  const criticalCount = section.items.filter(i => i.critical).length;

  sectionDiv.innerHTML = `
    <div class="section-header">
      <span class="section-num">${String(sIdx + 1).padStart(2,'0')}</span>
      <span class="section-title" data-en="${section.section}" data-hi="${SECTION_HI[section.section] || section.section}">${SECTION_HI[section.section] || section.section}</span>
      <span class="section-meta"><span class="section-progress" data-section="${sIdx}">0</span> / ${total} · ${criticalCount} <span class="t-crit">${UI.hi.progressCrit}</span></span>
    </div>
    <div class="section-items"></div>
  `;

  const itemsContainer = sectionDiv.querySelector('.section-items');

  section.items.forEach((item) => {
    state[item.id] = {
      passed: false,
      type: item.type,
      critical: item.critical,
      running: item.type === 'auto',
      autoResult: item.autoResult || null
    };

    const hi = HI[item.id] || {};
    const t = {
      title_en: item.title, title_hi: hi.title || item.title,
      sum_en: item.summary, sum_hi: hi.summary || item.summary,
      what_en: item.what, what_hi: hi.what || item.what,
      why_en: item.why, why_hi: hi.why || item.why,
      how_en: item.how, how_hi: hi.how || item.how
    };

    const itemEl = document.createElement('div');
    itemEl.className = 'item';
    itemEl.dataset.id = item.id;

    const resultBox = item.type === 'auto'
      ? `<div class="result-box ${item.autoResult.pass ? 'pass' : 'fail'}" id="result-${item.id}" style="display:none">${item.autoResult.message}</div>`
      : '';

    itemEl.innerHTML = `
      <div class="item-row">
        <div class="indicator ${item.type === 'manual' ? 'manual' : 'running'}" data-indicator="${item.id}"></div>
        <div class="item-main">
          <div class="item-title" data-en="${t.title_en.replace(/"/g,'&quot;')}" data-hi="${t.title_hi.replace(/"/g,'&quot;')}">${t.title_hi}</div>
          <div class="item-summary" data-en="${t.sum_en.replace(/"/g,'&quot;')}" data-hi="${t.sum_hi.replace(/"/g,'&quot;')}">${t.sum_hi}</div>
        </div>
        <div class="item-status">
          ${item.critical ? `<span class="pill critical t-critical">${UI.hi.critical}</span>` : ''}
          ${item.type === 'manual'
            ? `<span class="pill manual t-manual">${UI.hi.manual}</span>`
            : `<span class="pill result-running" data-pill="${item.id}">${UI.hi.running}</span>`}
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 4 L10 8 L6 12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="detail">
        <div class="detail-inner">
          ${item.type === 'auto' ? `
          <div class="detail-block">
            <div class="detail-label t-lbl-result">${UI.hi.lblResult}</div>
            <div class="detail-text">${resultBox}</div>
          </div>` : ''}
          <div class="detail-block">
            <div class="detail-label t-lbl-what">${UI.hi.lblWhat}</div>
            <div class="detail-text" data-en="${t.what_en.replace(/"/g,'&quot;')}" data-hi="${t.what_hi.replace(/"/g,'&quot;')}">${t.what_hi}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label t-lbl-why">${UI.hi.lblWhy}</div>
            <div class="detail-text" data-en="${t.why_en.replace(/"/g,'&quot;')}" data-hi="${t.why_hi.replace(/"/g,'&quot;')}">${t.why_hi}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label t-lbl-how">${UI.hi.lblHow}</div>
            <div class="detail-text" data-en="${t.how_en.replace(/"/g,'&quot;')}" data-hi="${t.how_hi.replace(/"/g,'&quot;')}">${t.how_hi}</div>
          </div>
        </div>
      </div>
    `;

    itemsContainer.appendChild(itemEl);

    itemEl.querySelector('.item-row').addEventListener('click', (e) => {
      if (e.target.closest('.indicator.manual')) return;
      itemEl.classList.toggle('open');
    });

    const indicator = itemEl.querySelector('.indicator');
    if (item.type === 'manual') {
      indicator.addEventListener('click', (e) => {
        e.stopPropagation();
        state[item.id].passed = !state[item.id].passed;
        indicator.classList.toggle('checked', state[item.id].passed);
        updateScore();
      });
    }
  });

  sectionsEl.appendChild(sectionDiv);
});

let lastStatus = { key: 'running', n: 0 };
let lastAutorun = { key: 'running', p: 0, n: 0, f: 0 };

function L() { return UI[currentLang]; }

function renderAutorunStatus() {
  const el = document.getElementById('autorun-status');
  const s = lastAutorun;
  if (s.key === 'running') el.textContent = L().autorunRunning;
  else if (s.key === 'allpass') el.textContent = L().autorunAllPass(s.n);
  else el.textContent = L().autorunSome(s.p, s.n, s.f);
}

function renderFooterStatus() {
  const el = document.getElementById('status-text');
  const s = lastStatus;
  if (s.key === 'running') el.textContent = L().stRunning;
  else if (s.key === 'blocked') el.textContent = L().stBlocked(s.n);
  else if (s.key === 'remaining') el.textContent = L().stRemaining(s.n);
  else if (s.key === 'optional') el.textContent = L().stOptional(s.n);
  else if (s.key === 'ready') el.textContent = L().stReady;
}

function runAutoChecks() {
  const autoItems = Object.entries(state).filter(([_, s]) => s.type === 'auto');

  autoItems.forEach(([id, s]) => {
    s.running = true;
    s.passed = false;
    const indicator = document.querySelector(`[data-indicator="${id}"]`);
    const pill = document.querySelector(`[data-pill="${id}"]`);
    const resultBox = document.getElementById(`result-${id}`);
    indicator.className = 'indicator running';
    if (pill) {
      pill.className = 'pill result-running';
      pill.dataset.state = 'running';
      pill.textContent = L().running;
    }
    if (resultBox) resultBox.style.display = 'none';
  });

  lastAutorun = { key: 'running', p: 0, n: autoItems.length, f: 0 };
  renderAutorunStatus();
  updateScore();

  autoItems.forEach(([id, s], idx) => {
    setTimeout(() => {
      const result = s.autoResult;
      s.running = false;
      s.passed = result.pass;

      const indicator = document.querySelector(`[data-indicator="${id}"]`);
      const pill = document.querySelector(`[data-pill="${id}"]`);
      const resultBox = document.getElementById(`result-${id}`);

      indicator.className = `indicator ${result.pass ? 'passed' : 'failed'}`;
      if (pill) {
        pill.className = `pill ${result.pass ? 'result-pass' : 'result-fail'}`;
        pill.dataset.state = result.pass ? 'passed' : 'failed';
        pill.textContent = result.pass ? L().passed : L().failed;
      }
      if (resultBox) resultBox.style.display = 'block';

      updateScore();

      if (idx === autoItems.length - 1) {
        setTimeout(() => {
          const failedCount = autoItems.filter(([, st]) => !st.passed).length;
          lastAutorun = failedCount === 0
            ? { key: 'allpass', p: autoItems.length, n: autoItems.length, f: 0 }
            : { key: 'some', p: autoItems.length - failedCount, n: autoItems.length, f: failedCount };
          renderAutorunStatus();
        }, 150);
      }
    }, 300 + idx * 110);
  });
}

const totalItems = Object.keys(state).length;
const totalCritical = Object.values(state).filter(s => s.critical).length;
document.getElementById('score-total').textContent = totalItems;

function updateScore() {
  const passedCount = Object.values(state).filter(s => s.passed).length;
  const criticalPassed = Object.values(state).filter(s => s.passed && s.critical).length;
  const anyRunning = Object.values(state).some(s => s.running);
  const allCriticalDone = criticalPassed === totalCritical;
  const criticalAutoFailing = Object.values(state).some(s => s.critical && s.type === 'auto' && !s.running && !s.passed);

  document.getElementById('score-num').textContent = passedCount;
  document.getElementById('score-bar').style.width = `${(passedCount / totalItems) * 100}%`;

  checklist.forEach((section, sIdx) => {
    const done = section.items.filter(i => state[i.id].passed).length;
    const progEl = document.querySelector(`.section-progress[data-section="${sIdx}"]`);
    if (progEl) progEl.textContent = done;
  });

  const footerStatus = document.getElementById('footer-status');
  const publishBtn = document.getElementById('btn-publish');

  footerStatus.classList.remove('ready', 'blocked');

  if (anyRunning) {
    lastStatus = { key: 'running', n: 0 };
    publishBtn.classList.add('disabled');
  } else if (criticalAutoFailing) {
    footerStatus.classList.add('blocked');
    const failedCritical = Object.values(state).filter(s => s.critical && !s.passed).length;
    lastStatus = { key: 'blocked', n: failedCritical };
    publishBtn.classList.add('disabled');
  } else if (!allCriticalDone) {
    lastStatus = { key: 'remaining', n: totalCritical - criticalPassed };
    publishBtn.classList.add('disabled');
  } else if (passedCount < totalItems) {
    footerStatus.classList.add('ready');
    lastStatus = { key: 'optional', n: totalItems - passedCount };
    publishBtn.classList.remove('disabled');
  } else {
    footerStatus.classList.add('ready');
    lastStatus = { key: 'ready', n: 0 };
    publishBtn.classList.remove('disabled');
  }
  renderFooterStatus();
}

/* ---------- Language switch ---------- */
function applyLanguage(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  // toggle buttons
  document.getElementById('lang-hi').classList.toggle('active', lang === 'hi');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');

  // static UI strings with data-i18n
  const dict = UI[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });

  // section titles + item text (data-en / data-hi)
  document.querySelectorAll('[data-en][data-hi]').forEach(el => {
    el.innerHTML = el.getAttribute(lang === 'hi' ? 'data-hi' : 'data-en');
  });

  // detail block labels
  document.querySelectorAll('.t-lbl-result').forEach(e => e.textContent = dict.lblResult);
  document.querySelectorAll('.t-lbl-what').forEach(e => e.textContent = dict.lblWhat);
  document.querySelectorAll('.t-lbl-why').forEach(e => e.textContent = dict.lblWhy);
  document.querySelectorAll('.t-lbl-how').forEach(e => e.textContent = dict.lblHow);

  // pills
  document.querySelectorAll('.t-critical').forEach(e => e.textContent = dict.critical);
  document.querySelectorAll('.t-manual').forEach(e => e.textContent = dict.manual);
  document.querySelectorAll('.t-crit').forEach(e => e.textContent = dict.progressCrit);

  // auto-check result pills reflect current state
  document.querySelectorAll('[data-pill]').forEach(p => {
    const st = p.dataset.state || 'running';
    p.textContent = st === 'passed' ? dict.passed : st === 'failed' ? dict.failed : dict.running;
  });

  // dynamic status lines
  renderAutorunStatus();
  renderFooterStatus();

  // CTA buttons if in a transient state, keep; else reset label
  const pub = document.getElementById('btn-publish');
  if (!pub.dataset.locked) {
    pub.innerHTML = `<span class="btn-publish-arrow">↑</span><span data-i18n="publish">${dict.publish}</span>`;
  }
}

document.getElementById('lang-hi').addEventListener('click', () => applyLanguage('hi'));
document.getElementById('lang-en').addEventListener('click', () => applyLanguage('en'));

setTimeout(runAutoChecks, 400);
document.getElementById('rerun-btn').addEventListener('click', runAutoChecks);

document.getElementById('btn-publish').addEventListener('click', () => {
  const btn = document.getElementById('btn-publish');
  if (btn.classList.contains('disabled')) return;
  btn.dataset.locked = '1';
  btn.innerHTML = L().publishing;
  setTimeout(() => {
    btn.innerHTML = L().published;
    btn.style.background = '#1f6f3e';
    btn.style.borderColor = '#1f6f3e';
  }, 700);
});

document.getElementById('btn-save').addEventListener('click', () => {
  const btn = document.getElementById('btn-save');
  btn.textContent = L().draftSaved;
  setTimeout(() => { btn.textContent = L().savedraft; }, 1500);
});

// initialise in Hindi
applyLanguage('hi');
</script>
