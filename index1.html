<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pre-Publish Review — SEO Gate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7;
    --paper: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: #2a2a2a;
    --muted: #8a8a85;
    --line: #e8e6df;
    --line-soft: #f1efe9;
    --ok: #1f6f3e;
    --ok-bg: #ecf3ee;
    --warn: #8a6d1f;
    --warn-bg: #f5f0e0;
    --err: #8a2a1f;
    --err-bg: #f5e8e5;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 24px 80px -32px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.015) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.015) 0%, transparent 50%);
    padding: 48px 24px;
  }

  .frame {
    max-width: 960px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 2px;
    overflow: hidden;
  }

  header {
    padding: 36px 56px 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 32px;
  }

  .header-left .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ok); display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .header-left h1 em {
    font-style: italic;
    font-weight: 300;
  }

  .header-left .post-title {
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-left .post-title span {
    color: var(--ink-soft);
  }

  .header-right {
    text-align: right;
    min-width: 220px;
  }

  .score-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .score {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  .score-total {
    font-size: 18px;
    color: var(--muted);
    margin-left: 2px;
  }

  .score-bar {
    margin-top: 12px;
    height: 1px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }

  .score-bar-fill {
    position: absolute;
    inset: 0;
    background: var(--ink);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.2, 0, 0, 1);
  }

  .autorun-banner {
    padding: 14px 56px;
    background: var(--line-soft);
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 12px;
  }

  .autorun-left {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .autorun-status { color: var(--muted); }

  .rerun-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--line);
    padding: 6px 12px;
    cursor: pointer;
    color: var(--ink-soft);
    border-radius: 2px;
    transition: all 0.18s ease;
  }

  .rerun-btn:hover { border-color: var(--ink); background: var(--paper); }

  .sections { padding: 16px 0 0; }

  .section {
    padding: 24px 56px 28px;
    border-bottom: 1px solid var(--line-soft);
  }

  .section:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 18px;
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .section-meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .item {
    border-top: 1px solid var(--line-soft);
    padding: 14px 0;
    transition: background 0.15s ease;
    position: relative;
  }

  .item:first-of-type { border-top: none; padding-top: 4px; }

  .item-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 18px;
    align-items: center;
    cursor: pointer;
  }

  .indicator {
    width: 18px;
    height: 18px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    flex-shrink: 0;
    position: relative;
  }

  .indicator.manual { cursor: pointer; }
  .indicator.manual:hover { border-color: var(--ink-soft); }

  .indicator.checked {
    background: var(--ink);
    border-color: var(--ink);
  }

  .indicator.checked::after {
    content: '';
    width: 9px;
    height: 5px;
    border-left: 1.5px solid var(--paper);
    border-bottom: 1.5px solid var(--paper);
    transform: rotate(-45deg) translateY(-1px);
  }

  .indicator.running { border-color: var(--line); background: var(--paper); }
  .indicator.running::after {
    content: '';
    width: 10px; height: 10px;
    border: 1.5px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .indicator.passed {
    background: var(--ok);
    border-color: var(--ok);
  }
  .indicator.passed::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 1.5px solid var(--paper);
    border-bottom: 1.5px solid var(--paper);
    transform: rotate(-45deg) translateY(-1px);
  }

  .indicator.failed {
    background: var(--err-bg);
    border-color: var(--err);
  }
  .indicator.failed::after {
    content: '!';
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--err);
    line-height: 1;
  }

  .item-main { min-width: 0; }

  .item-title {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-bottom: 2px;
  }

  .item-summary {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.4;
  }

  .item-status {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 2px;
    background: var(--line-soft);
    color: var(--muted);
  }

  .pill.critical { background: #2a2a2a; color: var(--paper); }
  .pill.manual { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .pill.result-pass { background: var(--ok-bg); color: var(--ok); }
  .pill.result-fail { background: var(--err-bg); color: var(--err); }
  .pill.result-running { background: transparent; color: var(--muted); border: 1px solid var(--line); }

  .chevron {
    width: 14px;
    height: 14px;
    color: var(--muted);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .item.open .chevron { transform: rotate(90deg); }

  .detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.2, 0, 0, 1);
  }

  .item.open .detail { max-height: 1200px; }

  .detail-inner {
    padding: 18px 0 8px 42px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .detail-block {
    border-left: 1px solid var(--line);
    padding-left: 18px;
  }

  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .detail-text {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .detail-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: var(--line-soft);
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--ink);
  }

  .detail-text strong {
    font-weight: 600;
    color: var(--ink);
  }

  .result-box {
    margin-top: 4px;
    padding: 10px 12px;
    background: var(--line-soft);
    border-left: 2px solid var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .result-box.pass { background: var(--ok-bg); border-left-color: var(--ok); color: var(--ok); }
  .result-box.fail { background: var(--err-bg); border-left-color: var(--err); color: var(--err); }

  footer {
    padding: 28px 56px 36px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.015));
    border-top: 1px solid var(--line);
  }

  .footer-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .footer-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s ease;
  }

  .footer-status.ready .dot { background: var(--ok); }
  .footer-status.ready { color: var(--ok); }
  .footer-status.blocked .dot { background: var(--err); }
  .footer-status.blocked { color: var(--err); }

  .footer-actions {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .btn {
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 14px 28px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    min-width: 140px;
  }

  .btn:hover { border-color: var(--ink); }

  .btn-save { flex: 0 1 auto; }

  .btn-publish {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .btn-publish.disabled {
    background: var(--line-soft);
    color: var(--muted);
    border-color: var(--line);
    cursor: not-allowed;
  }

  .btn-publish.disabled:hover { border-color: var(--line); }
  .btn-publish:not(.disabled):hover { background: #000; }

  .btn-publish-arrow {
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.3s ease;
  }

  .btn-publish:not(.disabled):hover .btn-publish-arrow {
    transform: translateY(-2px);
  }

  @media (max-width: 720px) {
    body { padding: 16px 12px; }
    header { padding: 28px 24px 24px; flex-direction: column; align-items: flex-start; }
    .header-right { text-align: left; width: 100%; }
    .autorun-banner { padding: 12px 24px; flex-wrap: wrap; }
    .section { padding: 20px 24px 24px; }
    footer { padding: 24px; }
    .header-left h1 { font-size: 28px; }
    .score { font-size: 44px; }
    .detail-inner { padding-left: 0; }
    .footer-actions { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="frame">

  <header>
    <div class="header-left">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        Pre-Publish Review · SEO Gate
      </div>
      <h1>Before this goes <em>live</em>.</h1>
      <div class="post-title">post: <span id="post-title-display">Budget 2026 — टैक्स स्लैब में बड़ा बदलाव, जानें किसे फायदा</span></div>
    </div>
    <div class="header-right">
      <div class="score-label">Readiness</div>
      <div class="score">
        <span id="score-num">0</span><span class="score-total">/<span id="score-total">0</span></span>
      </div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar"></div></div>
    </div>
  </header>

  <div class="autorun-banner">
    <div class="autorun-left">
      <span class="autorun-status" id="autorun-status">Running automated checks…</span>
    </div>
    <button class="rerun-btn" id="rerun-btn">↻ Re-run auto checks</button>
  </div>

  <div class="sections" id="sections"></div>

  <footer>
    <div class="footer-status" id="footer-status">
      <span class="dot"></span>
      <span id="status-text">Running checks…</span>
    </div>
    <div class="footer-actions">
      <button class="btn btn-save" id="btn-save">Save as draft</button>
      <button class="btn btn-publish disabled" id="btn-publish">
        <span class="btn-publish-arrow">↑</span>Publish
      </button>
    </div>
  </footer>

</div>

<script>
const checklist = [
  {
    section: "Content Integrity",
    items: [
      {
        id: "word-count",
        title: "Word count meets minimum threshold",
        summary: "Article body has at least 350 words across 3+ paragraphs.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "412 words across 5 paragraphs — passed." },
        what: "Confirms the post contains a substantive body — at minimum 350 words distributed across three or more paragraphs.",
        why: "Thin pages compete poorly in news ranking and are routinely excluded from Google Discover. Below this floor, the page is flagged as low-value and pushed down.",
        how: "If under threshold, expand context, background, related developments, or quotes. Avoid padding — add information the reader cannot already get from the headline."
      },
      {
        id: "title-meta",
        title: "Title & meta — full names, keywords, English prefix",
        summary: "SEO title and meta description filled, with full names and primary keyword present.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "Title 58c · Meta 152c · Primary keyword present · English prefix detected." },
        what: "SEO Title (50–60 characters) and Meta Description (140–160 characters) must both exist. Both must contain the primary keyword, use <strong>full names</strong> (not first names alone, not initials), and carry the agreed English keyword prefix used for news indexing on non-English pages.",
        why: "These are the click decision in the SERP. Full names match how readers search; partial names fail. The English keyword prefix is what makes regional-language articles discoverable by mixed-script queries. A missing or truncated meta lets Google rewrite it, often poorly.",
        how: "Front-load the keyword. Spell out names completely on first reference in the title. Use the English prefix exactly as documented in the SEO playbook — do not translate it. Avoid duplicating the H1 verbatim."
      },
      {
        id: "heading-structure",
        title: "Heading hierarchy is valid (H1 → H2 → H3)",
        summary: "Exactly one H1, H2s precede H3s, no skipped levels.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "1 H1 · 4 H2 · 2 H3 · hierarchy clean." },
        what: "The post must contain exactly one H1 (usually the post title), with H2s and H3s used in correct hierarchical order without skipping levels.",
        why: "Heading structure is how crawlers and screen readers parse meaning. Multiple H1s confuse intent; skipped levels (H1 → H4) signal poor semantic structure and weaken keyword association.",
        how: "Use H2 for major sections, H3 only nested inside an H2. Never bold a paragraph and call it a heading — use real heading tags."
      },
      {
        id: "alt-text",
        title: "All images have descriptive ALT text",
        summary: "Every image has non-empty, descriptive alt attribute.",
        critical: true,
        type: "auto",
        autoResult: { pass: false, message: "2 of 5 images missing alt text. Featured image alt present." },
        what: "Every image in the post body and the featured image must carry an alt attribute that describes what is in the image — not the file name, not keyword stuffing.",
        why: "ALT text is read by accessibility tools and parsed by image search. Missing alt is now a mandatory-fail at our publishing standard. It also feeds Google Discover image selection.",
        how: "Describe what someone who cannot see the image would need to know: subject, action, context. For people, name them. For charts, summarise the takeaway."
      },
      {
        id: "click-bait",
        title: "Title is not click-bait",
        summary: "Headline delivers what it promises, no shock words or curiosity-gap fishing.",
        critical: true,
        type: "manual",
        what: "Title accurately summarises the article. No 'You won't believe', 'SHOCKING', vague pronouns ('THIS happened…'), or curiosity-gap question marks where the article does not in fact answer the question. The article body must deliver, within the first two paragraphs, exactly what the headline promised.",
        why: "Google's site-quality systems explicitly down-rank click-bait at the domain level. One viral click-bait win is not worth the long-tail penalty to every other URL on the site. Repeated click-bait is also tracked by Google Discover and removes the entire site from the feed.",
        how: "Read the title and the lead. If the lead does not directly satisfy the headline's promise within two sentences, rewrite one of them. When in doubt, ask: would I feel cheated reading this if I clicked on that headline?"
      }
    ]
  },
  {
    section: "On-Page SEO",
    items: [
      {
        id: "slug-url",
        title: "URL slug is clean and locked",
        summary: "English slug, hyphenated, no transliteration, will not change post-publish.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "Slug: top-10-election-highlights · English · 38 chars." },
        what: "URL slug is in English (translated/transliterated URLs are blocked), uses hyphens, contains the primary keyword, and is final — the slug must not change after publishing.",
        why: "URL changes post-publish kill social shares, break backlinks, and force Google to re-process the page. Translated slugs degrade indexing in non-Latin scripts.",
        how: "Decide the slug before hitting publish. Keep it under ~75 characters. Strip stop words (the, a, of) where it stays readable."
      },
      {
        id: "canonical",
        title: "Canonical tag points to the correct URL",
        summary: "Self-canonical on the live URL, AMP and non-AMP cross-referenced.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "Self-canonical set · AMP ↔ non-AMP pair valid." },
        what: "The post sets a self-referencing canonical to its own final URL. If an AMP version exists, the AMP page declares rel=canonical to the non-AMP, and the non-AMP declares rel=amphtml to the AMP.",
        why: "Incorrect canonicals are the single most common cause of pages dropping from the index. A canonical pointing elsewhere tells Google to ignore this page entirely.",
        how: "Leave the canonical field blank to let WordPress auto-set the self-canonical. Only override if this article genuinely is a syndicated copy of another source."
      },
      {
        id: "internal-links",
        title: "Internal links to relevant existing posts",
        summary: "At least 2 contextual internal links to related articles on the site.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "3 internal links detected · all dofollow · anchors descriptive." },
        what: "The article body links to two or more relevant existing posts on the site, placed naturally inside body copy (not in a 'Related' widget).",
        why: "Internal links pass authority, help Google discover and re-crawl older pages, and increase session depth. New articles starved of internal links struggle to get indexed quickly.",
        how: "Link the first mention of a person, event, or topic to the canonical article on that topic. Use descriptive anchor text — never 'click here' or 'read more'."
      },
      {
        id: "external-links",
        title: "External links carry correct rel attributes",
        summary: "Outbound links: rel=noopener, sponsored / ugc tagged where needed.",
        critical: false,
        type: "auto",
        autoResult: { pass: true, message: "4 external links · rel=noopener on all · 0 sponsored, 0 ugc detected." },
        what: "Every external link has target=_blank plus rel=noopener. Any paid, sponsored, or affiliate link is marked rel=sponsored. Any user-submitted link is marked rel=ugc.",
        why: "Unmarked sponsored links violate Google's spam policy and risk a manual action. rel=noopener is also a basic security requirement to prevent tab-hijacking.",
        how: "Use the link block's attributes panel. When in doubt about a link being sponsored, ask editorial — getting this wrong is a domain-level risk."
      },
      {
        id: "schema",
        title: "Article schema (NewsArticle JSON-LD) is valid",
        summary: "NewsArticle schema with headline, dates, author, publisher, 1200px+ image.",
        critical: true,
        type: "auto",
        autoResult: { pass: true, message: "NewsArticle schema valid · all required fields present · image 1600×900." },
        what: "The page outputs a <strong>NewsArticle</strong> (or Article) JSON-LD block including <code>headline</code>, <code>datePublished</code>, <code>dateModified</code>, <code>author</code> (with profile URL), <code>publisher</code> (with logo), and a primary <code>image</code> at least 1200px wide.",
        why: "Schema is what makes the article eligible for Top Stories, Discover carousels, and rich result presentation. A failed schema means a regular blue link instead of a visual placement — and for news, that is the difference between thousands of impressions and almost none.",
        how: "Use the schema validator preview shown below. If a field is red, the most common cause is a missing author profile URL or an image below 1200px wide. Fix at source — never hand-edit the JSON-LD."
      }
    ]
  },
  {
    section: "Media, Embeds & Performance",
    items: [
      {
        id: "featured-image",
        title: "Featured image is 1200px+ and optimised",
        summary: "Min 1200px wide, under ~200KB, WebP preferred, 16:9 ratio.",

const sectionsEl = document.getElementById('sections');
const state = {};

checklist.forEach((section, sIdx) => {
  const sectionDiv = document.createElement('div');
  sectionDiv.className = 'section';

  const total = section.items.length;
  const criticalCount = section.items.filter(i => i.critical).length;

  sectionDiv.innerHTML = `
    <div class="section-header">
      <span class="section-num">${String(sIdx + 1).padStart(2,'0')}</span>
      <span class="section-title">${section.section}</span>
      <span class="section-meta"><span class="section-progress" data-section="${sIdx}">0</span> / ${total} · ${criticalCount} critical</span>
    </div>
    <div class="section-items"></div>
  `;

  const itemsContainer = sectionDiv.querySelector('.section-items');

  section.items.forEach((item) => {
    state[item.id] = {
      passed: false,
      type: item.type,
      critical: item.critical,
      running: item.type === 'auto',
      autoResult: item.autoResult || null
    };

    const itemEl = document.createElement('div');
    itemEl.className = 'item';
    itemEl.dataset.id = item.id;

    const resultBox = item.type === 'auto'
      ? `<div class="result-box ${item.autoResult.pass ? 'pass' : 'fail'}" id="result-${item.id}" style="display:none">${item.autoResult.message}</div>`
      : '';

    itemEl.innerHTML = `
      <div class="item-row">
        <div class="indicator ${item.type === 'manual' ? 'manual' : 'running'}" data-indicator="${item.id}"></div>
        <div class="item-main">
          <div class="item-title">${item.title}</div>
          <div class="item-summary">${item.summary}</div>
        </div>
        <div class="item-status">
          ${item.critical ? '<span class="pill critical">Critical</span>' : ''}
          ${item.type === 'manual'
            ? '<span class="pill manual">Manual</span>'
            : `<span class="pill result-running" data-pill="${item.id}">Running</span>`}
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 4 L10 8 L6 12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="detail">
        <div class="detail-inner">
          ${item.type === 'auto' ? `
          <div class="detail-block">
            <div class="detail-label">Automated check result</div>
            <div class="detail-text">${resultBox}</div>
          </div>` : ''}
          <div class="detail-block">
            <div class="detail-label">What this checks</div>
            <div class="detail-text">${item.what}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Why it matters</div>
            <div class="detail-text">${item.why}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">How to fix / pass</div>
            <div class="detail-text">${item.how}</div>
          </div>
        </div>
      </div>
    `;

    itemsContainer.appendChild(itemEl);

    itemEl.querySelector('.item-row').addEventListener('click', (e) => {
      if (e.target.closest('.indicator.manual')) return;
      itemEl.classList.toggle('open');
    });

    const indicator = itemEl.querySelector('.indicator');
    if (item.type === 'manual') {
      indicator.addEventListener('click', (e) => {
        e.stopPropagation();
        state[item.id].passed = !state[item.id].passed;
        indicator.classList.toggle('checked', state[item.id].passed);
        updateScore();
      });
    }
  });

  sectionsEl.appendChild(sectionDiv);
});

function runAutoChecks() {
  const autoItems = Object.entries(state).filter(([_, s]) => s.type === 'auto');

  autoItems.forEach(([id, s]) => {
    s.running = true;
    s.passed = false;
    const indicator = document.querySelector(`[data-indicator="${id}"]`);
    const pill = document.querySelector(`[data-pill="${id}"]`);
    const resultBox = document.getElementById(`result-${id}`);
    indicator.className = 'indicator running';
    if (pill) {
      pill.className = 'pill result-running';
      pill.textContent = 'Running';
    }
    if (resultBox) resultBox.style.display = 'none';
  });

  document.getElementById('autorun-status').textContent = 'Running automated checks…';
  updateScore();

  autoItems.forEach(([id, s], idx) => {
    setTimeout(() => {
      const result = s.autoResult;
      s.running = false;
      s.passed = result.pass;

      const indicator = document.querySelector(`[data-indicator="${id}"]`);
      const pill = document.querySelector(`[data-pill="${id}"]`);
      const resultBox = document.getElementById(`result-${id}`);

      indicator.className = `indicator ${result.pass ? 'passed' : 'failed'}`;
      if (pill) {
        pill.className = `pill ${result.pass ? 'result-pass' : 'result-fail'}`;
        pill.textContent = result.pass ? 'Passed' : 'Failed';
      }
      if (resultBox) resultBox.style.display = 'block';

      updateScore();

      if (idx === autoItems.length - 1) {
        setTimeout(() => {
          const failedCount = autoItems.filter(([, st]) => !st.passed).length;
          document.getElementById('autorun-status').textContent =
            failedCount === 0
              ? `✓ All ${autoItems.length} automated checks passed`
              : `${autoItems.length - failedCount} of ${autoItems.length} automated checks passed · ${failedCount} need attention`;
        }, 150);
      }
    }, 300 + idx * 110);
  });
}

const totalItems = Object.keys(state).length;
const totalCritical = Object.values(state).filter(s => s.critical).length;
document.getElementById('score-total').textContent = totalItems;

function updateScore() {
  const passedCount = Object.values(state).filter(s => s.passed).length;
  const criticalPassed = Object.values(state).filter(s => s.passed && s.critical).length;
  const anyRunning = Object.values(state).some(s => s.running);
  const allCriticalDone = criticalPassed === totalCritical;
  const criticalAutoFailing = Object.values(state).some(s => s.critical && s.type === 'auto' && !s.running && !s.passed);

  document.getElementById('score-num').textContent = passedCount;
  document.getElementById('score-bar').style.width = `${(passedCount / totalItems) * 100}%`;

  checklist.forEach((section, sIdx) => {
    const done = section.items.filter(i => state[i.id].passed).length;
    const progEl = document.querySelector(`.section-progress[data-section="${sIdx}"]`);
    if (progEl) progEl.textContent = done;
  });

  const footerStatus = document.getElementById('footer-status');
  const statusText = document.getElementById('status-text');
  const publishBtn = document.getElementById('btn-publish');

  footerStatus.classList.remove('ready', 'blocked');

  if (anyRunning) {
    statusText.textContent = 'Running automated checks…';
    publishBtn.classList.add('disabled');
  } else if (criticalAutoFailing) {
    footerStatus.classList.add('blocked');
    const failedCritical = Object.values(state).filter(s => s.critical && !s.passed).length;
    statusText.textContent = `${failedCritical} critical check${failedCritical === 1 ? '' : 's'} failing — publish blocked`;
    publishBtn.classList.add('disabled');
  } else if (!allCriticalDone) {
    const remaining = totalCritical - criticalPassed;
    statusText.textContent = `${remaining} critical check${remaining === 1 ? '' : 's'} remaining — review manual items`;
    publishBtn.classList.add('disabled');
  } else if (passedCount < totalItems) {
    footerStatus.classList.add('ready');
    statusText.textContent = `Critical checks cleared · ${totalItems - passedCount} optional remaining`;
    publishBtn.classList.remove('disabled');
  } else {
    footerStatus.classList.add('ready');
    statusText.textContent = 'All checks passed — ready to publish';
    publishBtn.classList.remove('disabled');
  }
}

setTimeout(runAutoChecks, 400);
document.getElementById('rerun-btn').addEventListener('click', runAutoChecks);

document.getElementById('btn-publish').addEventListener('click', () => {
  const btn = document.getElementById('btn-publish');
  if (btn.classList.contains('disabled')) return;
  btn.innerHTML = 'Publishing…';
  setTimeout(() => {
    btn.innerHTML = '✓ Published';
    btn.style.background = '#1f6f3e';
    btn.style.borderColor = '#1f6f3e';
  }, 700);
});

document.getElementById('btn-save').addEventListener('click', () => {
  const btn = document.getElementById('btn-save');
  const original = btn.textContent;
  btn.textContent = '✓ Draft saved';
  setTimeout(() => { btn.textContent = original; }, 1500);
});
</script>
